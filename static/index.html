<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foundry Local – Chat Test</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --panel-2: #1e2230;
    --border: #2a2f3e;
    --text: #e6e8ee;
    --muted: #8b91a3;
    --accent: #6c8cff;
    --user: #2a3354;
    --assistant: #1e2230;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .badge {
    font-size: 12px;
    color: var(--muted);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
  }
  .badge b { color: var(--accent); font-weight: 600; }
  .controls { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
  .controls input[type=range] { accent-color: var(--accent); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { display: flex; gap: 12px; line-height: 1.55; }
  .avatar {
    width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }
  .msg.user .avatar { background: var(--user); }
  .msg.assistant .avatar { background: linear-gradient(135deg, #6c8cff, #a06cff); }
  .bubble {
    background: var(--assistant);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    white-space: pre-wrap;
    word-break: break-word;
    flex: 1;
  }
  .msg.user .bubble { background: var(--user); }
  .empty { color: var(--muted); text-align: center; margin: auto; }
  footer {
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 16px;
  }
  .input-row {
    max-width: 820px; margin: 0 auto;
    display: flex; gap: 10px; align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    resize: none;
    font-family: inherit;
    max-height: 160px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    height: 46px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .cursor::after { content: "▋"; animation: blink 1s steps(2) infinite; color: var(--accent); }
  @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
</style>
</head>
<body>
  <header>
    <h1>🧪 Foundry Local Chat</h1>
    <span class="badge" id="model-badge">lädt …</span>
    <div class="controls">
      <label>Temperatur: <span id="temp-val">0.7</span></label>
      <input type="range" id="temp" min="0" max="1.5" step="0.1" value="0.7" />
      <button id="reset" style="height:auto;padding:6px 12px;font-size:13px;background:var(--panel-2)">Reset</button>
    </div>
  </header>

  <div id="chat">
    <div class="empty" id="empty">Stelle eine Frage an dein lokales Modell 👇</div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Nachricht eingeben … (Enter zum Senden, Shift+Enter = neue Zeile)"></textarea>
      <button id="send">Senden</button>
    </div>
  </footer>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const tempSlider = document.getElementById("temp");
const tempVal = document.getElementById("temp-val");
const empty = document.getElementById("empty");

let history = [];

// Modell-Info laden
fetch("/api/info").then(r => r.json()).then(d => {
  document.getElementById("model-badge").innerHTML =
    `Modell: <b>${d.model_id}</b> · ${d.device} · ${d.endpoint}`;
}).catch(() => {
  document.getElementById("model-badge").textContent = "Backend nicht erreichbar";
});

tempSlider.oninput = () => tempVal.textContent = tempSlider.value;

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.onclick = send;
document.getElementById("reset").onclick = () => {
  history = [];
  chat.querySelectorAll(".msg").forEach(m => m.remove());
  empty.style.display = "block";
};

function addMessage(role, text) {
  empty.style.display = "none";
  const msg = document.createElement("div");
  msg.className = "msg " + role;
  msg.innerHTML = `<div class="avatar">${role === "user" ? "Du" : "AI"}</div>
                   <div class="bubble"></div>`;
  msg.querySelector(".bubble").textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg.querySelector(".bubble");
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage("user", text);
  history.push({ role: "user", content: text });
  input.value = "";
  input.style.height = "auto";
  sendBtn.disabled = true;

  const bubble = addMessage("assistant", "");
  bubble.classList.add("cursor");
  let answer = "";

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, temperature: parseFloat(tempSlider.value) }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6);
        if (data === "[DONE]") continue;
        const obj = JSON.parse(data);
        if (obj.error) { answer += "\n⚠️ Fehler: " + obj.error; }
        if (obj.token) { answer += obj.token; }
        bubble.textContent = answer;
        chat.scrollTop = chat.scrollHeight;
      }
    }
  } catch (err) {
    answer += "\n⚠️ Verbindungsfehler: " + err.message;
    bubble.textContent = answer;
  }

  bubble.classList.remove("cursor");
  history.push({ role: "assistant", content: answer });
  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
